<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO Primary -->
    <title>Inmova | Asesores Inmobiliarios en Santo Domingo, RD</title>
    <meta name="description" content="Encuentra apartamentos, casas y villas en venta o alquiler en el Gran Santo Domingo. Inmova — asesores inmobiliarios con más de 10 años de experiencia en República Dominicana." />
    <meta name="keywords" content="inmobiliaria santo domingo, apartamentos en venta república dominicana, casas en alquiler santo domingo, bienes raíces RD, piantini, naco, evaristo morales" />
    <link rel="canonical" href="https://inmova.do" />

    <!-- Favicon — SVG inline para no necesitar archivo externo -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231457B8'/><text y='.9em' font-size='72' font-family='serif' x='12' fill='white'>I</text></svg>" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://inmova.do" />
    <meta property="og:title"       content="Inmova | Asesores Inmobiliarios en Santo Domingo" />
    <meta property="og:description" content="Tu próxima inversión inmobiliaria en República Dominicana. Propiedades en venta y alquiler en Santo Domingo." />
    <meta property="og:image"       content="https://inmova.do/hero-city.jpg" />
    <meta property="og:locale"      content="es_DO" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Inmova | Asesores Inmobiliarios RD" />
    <meta name="twitter:description" content="Encuentra tu propiedad ideal en Santo Domingo con los mejores asesores inmobiliarios." />
    <meta name="twitter:image"       content="https://inmova.do/hero-city.jpg" />

    <!-- Performance: preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data — Real Estate Agent -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "Inmova Asesores Inmobiliarios",
      "url": "https://inmova.do",
      "description": "Asesores inmobiliarios especializados en el Gran Santo Domingo, República Dominicana.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Av. Abraham Lincoln",
        "addressLocality": "Santo Domingo",
        "addressCountry": "DO"
      },
      "telephone": "+1-809-000-0000",
      "areaServed": "Santo Domingo, República Dominicana",
      "sameAs": [
        "https://www.facebook.com/inmovard",
        "https://www.instagram.com/inmovard"
      ]
    }
    </script>

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0B1728" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

</html>
